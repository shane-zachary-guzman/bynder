<form [formGroup]="form" (ngSubmit)="submit()" class="flex flex-column gap-4 pt-2">

  <div class="flex flex-column gap-2">
    <label for="col-name" class="font-semibold">Name <span class="text-danger">*</span></label>
    <input
      pInputText
      id="col-name"
      type="text"
      formControlName="name"
      placeholder="My Lorcana Collection"
      [class.ng-invalid]="form.controls.name.invalid && form.controls.name.touched"
      [class.ng-dirty]="form.controls.name.touched"
    />
    @if (form.controls.name.invalid && form.controls.name.touched) {
      <small class="p-error">Name is required.</small>
    }
  </div>

  <div class="flex flex-column gap-2">
    <label for="col-description" class="font-semibold">Description <span class="text-color-secondary font-normal">(optional)</span></label>
    <textarea
      pTextarea
      id="col-description"
      formControlName="description"
      placeholder="A brief description..."
      rows="3"
      class="w-full"
    ></textarea>
  </div>

  <div class="flex justify-content-end gap-2 mt-2">
    <p-button
      type="button"
      label="Cancel"
      severity="secondary"
      [text]="true"
      (onClick)="cancelled.emit()"
    />
    <p-button
      type="submit"
      label="Save"
      icon="pi pi-check"
      [loading]="saving"
    />
  </div>

</form>
